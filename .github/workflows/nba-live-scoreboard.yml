name: Live NBA Scoreboard Update

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true  # This is key — enables push with GITHUB_TOKEN

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas nba_api requests beautifulsoup4

      - name: Run daily script
        run: python nba_live_scoreboard.py

      - name: Commit and push updated JSON
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add nba_today_games.json
          git commit -m "Daily update: $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push