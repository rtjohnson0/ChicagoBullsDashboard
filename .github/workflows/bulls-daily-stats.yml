name: Bulls Daily Stats

on:
  schedule:
    - cron: '0 13 * * *'  # 8 AM ET
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: |
          python -m pip install --upgrade pip
          pip install pandas nba_api requests beautifulsoup4
      - run: python bulls_daily_stats.py
      - run: |
            git config --global user.name "GitHub Action Bot"
            git config --global user.email "action@github.com"
    
            # Pull remote changes first (merge or rebase)
            git pull origin main --rebase || true  # ignore if no changes
    
            git add bulls_daily.json
            git commit -m "Daily Bulls stats update: $(date +'%Y-%m-%d %H:%M')" || echo "No changes to commit"
    
             git push origin HEAD:main
